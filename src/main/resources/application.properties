spring.application.name=backend
server.port=${PORT:8080}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200,http://127.0.0.1:4200}
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
app.cors.allowed-headers=*
app.cors.allow-credentials=false
app.cors.max-age=3600
app.security.api-rate-limit.limit=120
app.security.api-rate-limit.window-seconds=60
app.security.auth-rate-limit.limit=10
app.security.auth-rate-limit.window-seconds=60
spring.mongodb.uri=${SPRING_MONGODB_URI}
spring.data.mongodb.auto-index-creation=true
server.shutdown=graceful
management.health.mongodb.enabled=false
management.endpoint.health.show-details=always
management.endpoints.web.exposure.include=health,metrics,mappings,info
management.info.env.enabled=true
info.app.name=Airline Backend Project
info.app.description=Example of a functional and professional backend built with Java Spring Boot, applying security and REST APIs.
info.app.version=1.1.2
info.app.java-version=25